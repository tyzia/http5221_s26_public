		// Regex (Regular Expression)






		// Powerful tool to define a search pattern
		// used for matching strings.


		// Please, remember!
		// regex is working only with strings.
		// If provided input is not a string,
		// JS will convert it to a string.


		// Conversion to string

		// 87 -> "87" (number)
		// true -> "true" (boolean)
		// [1, 2, 3] -> "1,2,3" (array)
		// null -> "null"
		// undefined -> "undefined"

		// { name: "John" } -> "[object Object]" (object)







		// Where regex can be used?

		// -- searching logs
		// -- searching match in your project files
		// -- validating user input
		// -- replacing characters
		// -- extracting data
		// -- file renaming
		// and many more
















		// When working with Regex follow this approach:

		// 1. Create a pattern with / /
		// 2. Test string against this pattern (e.g. .test())





		// Example

		/h/.test('hello'); // returns true

		// In other words we say: "Find 'h' in the provided string"

		// console.log(/h/.test('hello')); // change to 'a'







		// .test()
		// checks if provided string has a match
		// from regex pattern, at least one.

		// .test() returns:

		// - true if regex matches any part of the string
		// - false if no match found






		// Patterns

		// Pattern can be:
		// - literal character
		// - combination of characters
		// - range of characters







		// Example

		/1/        // search for one number '1'
		/123/      // search for three numbers '123'
		/[123]/    // search for one number '1' or '2' or '3'
		/abc/      // search for three characters 'abc'
		/[abc]/    // search for one character 'a' or 'b' or 'c'


		/[0-9]/    // search for one number in the range
		/[a-z]/    // search for one letter in the range








		// Where regex is looking for values?

		// Regex looks everywhere in the string:
		// console.log(/cat/.test('The cat is nice'));














		// More examples

		/[123]/.test('2'); // true

		// console.log(/[123]/.test('2')); // change to '1', '0'
		// I want to find 1 or 2 or 3 in the string





		// What is returned here?

		/[123]/.test('02'); // ?

















		// Explanation:
		// console.log(/[123]/.test('02')); // true

		// The pattern /[123]/ matches any single digit from 1 to 3.

		// It does not require the entire string to match the pattern.
		// Instead, it checks if at least one character in the string matches the pattern.
		// The string '02' contains two characters: '0' and '2'.
		// The regex /[123]/ checks if any single character in the string '02'
		// is a digit between 1 and 3.
		// Since there is one '2' character, the regex finds a match,
		// and .test() returns true.














		/[a-z]/.test('a');
		// console.log(/[a-z]/.test('a')); // A ?

		// Explanation:
		// JS will convert null to "null" string.

		// Quantifiers in Regex:

		// . = matches any character
		// + = one or more match of previous character
		// * = zero or more match of previous character
		// ? = preceding character is optional
		// {n} = exactly n matches







		// Examples



		// . (any character)

		/c.t/.test('The cat is nice');     // true
		/c.t/.test('The cot is nice');     // true
		/c.t/.test('The ct is nice');      // false



		// + (one or more match of previous character)

		/ca+t/.test('The cat is nice');     // true
		/ca+t/.test('The caaat is nice');   // true
		/ca+t/.test('The ct is nice');      // false




		// * (zero or more of previous character)

		/ca*t/.test('The cat is nice');      // true
		/ca*t/.test('The caaat is nice');    // true
		/ca*t/.test('The ct is nice');       // true




		// ? (previous character is optional)

		/ca?t/.test('The cat is nice');       // true
		/ca?t/.test('The ct is nice');        // true
		/ca?t/.test('The caat is nice');      // false





		// {n} (exactly N matches of previous character)

		/ca{2}t/.test('The cat is nice');      // false
		/ca{2}t/.test('The caat is nice');     // true
		/ca{2}t/.test('The caaaaat is nice');  // true





		// You can combine special characters

		/c.+t/.test('The cat is nice');       // true
		/c.+t/.test('The ct is nice');        // false














		// How to search for . or other special characters?
		// We need to 'escape' them with '\'


		// . -> \.
		// + -> \+
		// * -> \*




		/./.test('no dots here');                 // true
		/\./.test('example.com');                 // true
		/\*\*/.test("this is **important**");     // true








		// Tricky question.
		// How to search for \ ?

		// /\/.test('is there slash?');     // SyntaxError









		// Escape \ with another \
		/\\/.test('is there \?');         // true
















		// Special markers in Regex:

		// \d = any number
		// \w = any word character (a letter, or a digit, or underscore)


		// Examples

		/\d/.test('abc123');        // true
		/\d+/.test('abc123');       // true
		/\d/.test('abc');           // false




















		// How to search for exact match in all string?

		// ^ = marks the beginning of the string
		// $ = marks the end of the string










		// Examples

		/^cat/.test('cat is cute');      // true
		/^cat/.test('The cat is cute');  // false

		/cute$/.test('The cat is cute');  // true
		/cute$/.test('cute cat');         // false

		/^cat$/.test('cat');             // true
		/^cat$/.test('cat ');            // false
