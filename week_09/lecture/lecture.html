		// A user can have multiple discounts:
		// - Staff discount (10%)
		// - Loyalty discount (5%)
		// - Bulk purchase discount (15% if buying 10+ items)
		// Discounts stack, but cannot exceed 40% total

		function calculateFinalPrice(order) {
			let basePrice = order.totalPrice;
			let totalDiscount = 0;

			// Check if add staff discount
			if (order.user.isStaff) {
				totalDiscount += 0.10;
			}

			// Check if add loyalty discount
			if (order.user.isLoyalCustomer) {
				totalDiscount += 0.05;
			}

			// Check if add bulk discount
			if (order.items.length >= 10) {
				totalDiscount += 0.15;
			}

			if (totalDiscount > 0.40) {
				totalDiscount = 0.40;
			}

			return basePrice * (1 - totalDiscount);
		}
