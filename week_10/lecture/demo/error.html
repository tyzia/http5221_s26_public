  function isValidAge(age) {
  	return age > 18 || age < 25;
  }

  function testIsValidAge(age, expectedResult) {
  	return isValidAge(age) === expectedResult;
  }


  const testCases = [
  	{ age: 20, expected: true },
  	{ age: 1, expected: false },
  	{ age: 100, expected: false },
  	{ age: 17, expected: false }, // edge case
  	{ age: 18, expected: true }, // edge case
  	{ age: 19, expected: true }, // edge case
  	{ age: 24, expected: true }, // edge case
  	{ age: 25, expected: true }, // edge case
  	{ age: 26, expected: false }, // edge case
  ];

  testCases.forEach(({ age, expected }) => {
  	const result = testIsValidAge(age, expected);
  	if (result) {
  		console.log(`Test passed for age ${age}`);
  	} else {
  		console.error(`Test failed for age ${age}: expected ${expected}, got ${isValidAge(age)}`);
  	}
  });
